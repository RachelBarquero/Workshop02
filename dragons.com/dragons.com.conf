<VirtualHost *:80>
	ServerName dragons.com
	ServerAlias www.dragons.com

	ServerAdmin webmaster@localhost
	DocumentRoot /vagrant/sites/dragons.com
	DirectoryIndex index.php index.html

	<Directory /vagrant/sites/dragons.com>
		Options FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/dragons.log
	CustomLog ${APACHE_LOG_DIR}/dragons_access.log combined
</VirtualHost>
